<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UMA snap</title>
    <link rel="icon" href="app_icon.png" type="image/png">
    <style>
        :root {
            --primary: #ff4757; --secondary: #3498db; --success: #2ed573;
            --bg: #f1f2f6; --panel-bg: #ffffff; --text-main: #2f3542;
            --text-sub: #57606f; --border: #eee; --input-bg: #fafafa;
        }

        body.dark-theme {
            --bg: #1e272e; --panel-bg: #2f3542; --text-main: #f1f2f6;
            --text-sub: #ced6e0; --border: #3d464d; --input-bg: #3d464d;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: var(--text-main); transition: 0.3s; }
        .app-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 400px 1fr; gap: 25px; }
        
        .panel { background: var(--panel-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); height: fit-content; position: sticky; top: 20px; }
        .panel h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 15px; color: var(--secondary); display: flex; justify-content: space-between; align-items: center; }
        
        .theme-toggle { font-size: 11px; padding: 5px 12px; border-radius: 20px; border: 1px solid var(--secondary); background: none; color: var(--secondary); cursor: pointer; font-weight: bold; }

        #drop-zone { border: 2px dashed var(--secondary); border-radius: 15px; padding: 25px 10px; text-align: center; color: var(--secondary); cursor: pointer; background: var(--input-bg); font-weight: 600; margin-bottom: 20px; font-size: 14px; }

        .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 12px; color: var(--text-main); }

        input[type="range"] { width: 100%; cursor: pointer; margin-top: 5px; }

        .frame-list { 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            max-height: 350px; overflow-y: auto; padding: 10px; 
            background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px;
        }
        .frame-list::-webkit-scrollbar { width: 6px; }
        .frame-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .frame-thumb { width: 100%; aspect-ratio: 1/1; border: 2px solid var(--border); border-radius: 8px; cursor: pointer; object-fit: contain; background: white; transition: 0.2s; }
        .frame-thumb.active { border-color: var(--primary); transform: scale(1.05); }

        .preview-section { background: var(--panel-bg); padding: 25px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        canvas { 
            max-width: 100%; max-height: 85vh; border-radius: 5px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); background: #fff; 
            cursor: grab; touch-action: none; 
        }

        #save-btn { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 20px; }
        
        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } .panel { position: relative; top: 0; } }
    </style>
</head>
<body id="main-body">

    <div class="app-container">
        <div class="panel">
            <h3>UMA Snap <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn">Grey Mode</button></h3>
            
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div id="drop-zone">사진 클릭/드래그 업로드</div>

            <div class="control-group">
                <label class="label">1. 프레임 디자인 선택</label>
                <div class="frame-list">
                    <img src="250605_umasnap_frame_sw.png" class="frame-thumb active" onclick="changeFrame(this, '250605_umasnap_frame_sw.png')">
                    <img src="250605_umasnap_frame_ss.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ss.png')">
                    <img src="250605_umasnap_frame_tt.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_tt.png')">
                    <img src="250605_umasnap_frame_ms.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ms.png')">
                    <img src="250605_umasnap_frame_oc.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_oc.png')">
                    <img src="250605_umasnap_frame_ts.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ts.png')">
                    <img src="250605_umasnap_frame_mm.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_mm.png')">
                    <img src="250605_umasnap_frame_sr.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_sr.png')">
                    <img src="250605_umasnap_frame_rs.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_rs.png')">
                </div>
            </div>

            <div class="control-group">
                <label class="label">2. 사진 조정 (터치 핀치 줌 지원)</label>
                <div style="font-size: 11px; color: var(--text-sub);">Zoom (슬라이더 또는 핀치)</div>
                <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1">
                <div style="font-size: 11px; color: var(--text-sub); margin-top: 10px;">X / Y 이동</div>
                <input type="range" id="moveX" min="-2000" max="2000" value="0">
                <input type="range" id="moveY" min="-2000" max="2000" value="0">
            </div>

            <div class="control-group">
                <label class="label">3. 저장 설정 (1080x1440)</label>
                <div style="margin-bottom: 8px; font-size: 13px;">
                    <label><input type="radio" name="format" value="webp" checked> WebP</label>
                    <label><input type="radio" name="format" value="jpeg"> JPG</label>
                    <label><input type="radio" name="format" value="png"> PNG</label>
                </div>
                <input type="range" id="quality" min="50" max="100" step="5" value="95">
                <div id="q-label" style="font-size: 11px; color: var(--text-sub);">품질: 95%</div>
            </div>
            
            <button id="save-btn">이미지 저장하기</button>
        </div>

        <div class="preview-section">
            <canvas id="main-canvas"></canvas>
            <div id="no-img-msg" style="color: var(--text-sub); font-size: 13px; text-align: center; margin-top: 20px;">
                두 손가락으로 벌려 확대하고 오므려 축소할 수 있습니다.
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        
        let frameImg = new Image();
        let userImg = new Image();
        let isUserImgLoaded = false;
        
        let state = {
            ratio: 0.75, zoom: 1, x: 0, y: 0,
            frameUrl: '250605_umasnap_frame_sw.png',
            quality: 0.95
        };

        // --- 테마 전환 ---
        function toggleTheme() {
            const body = document.getElementById('main-body');
            const btn = document.getElementById('theme-btn');
            body.classList.toggle('dark-theme');
            btn.innerText = body.classList.contains('dark-theme') ? "White Mode" : "Grey Mode";
        }

        // --- [핵심] 터치 및 드래그 로직 보강 ---
        let isDragging = false;
        let lastX = 0; let lastY = 0;
        let initialPinchDist = 0;
        let initialZoom = 1;

        function getDist(t1, t2) {
            return Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        }

        // 마우스 시작
        canvas.onmousedown = (e) => { if (!isUserImgLoaded) return; isDragging = true; lastX = e.clientX; lastY = e.clientY; };
        
        // 터치 시작 (핀치 줌 감지 시작)
        canvas.addEventListener('touchstart', (e) => {
            if (!isUserImgLoaded) return;
            if (e.touches.length === 1) {
                isDragging = true;
                lastX = e.touches[0].clientX;
                lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false; // 핀치 시 이동 중단
                initialPinchDist = getDist(e.touches[0], e.touches[1]);
                initialZoom = state.zoom;
            }
        }, {passive: false});

        // 이동 및 줌 처리
        function handleMove(x, y, isTouch = false, e = null) {
            if (isTouch && e && e.touches.length === 2) {
                // 핀치 줌 실행
                const currentDist = getDist(e.touches[0], e.touches[1]);
                const zoomFactor = currentDist / initialPinchDist;
                state.zoom = Math.min(Math.max(initialZoom * zoomFactor, 0.1), 5);
                document.getElementById('zoom').value = state.zoom;
            } else if (isDragging) {
                // 드래그 이동
                const rect = canvas.getBoundingClientRect();
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;
                state.x += (x - lastX) * scaleX;
                state.y += (y - lastY) * scaleY;
                document.getElementById('moveX').value = state.x;
                document.getElementById('moveY').value = state.y;
                lastX = x; lastY = y;
            }
            draw();
        }

        window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            handleMove(touch.clientX, touch.clientY, true, e);
        }, {passive: false});

        window.onmouseup = () => { isDragging = false; };
        canvas.addEventListener('touchend', () => { isDragging = false; initialPinchDist = 0; });

        // --- 기타 기능 ---
        function loadFrame(url) {
            frameImg = new Image();
            frameImg.crossOrigin = "Anonymous";
            frameImg.onload = draw;
            frameImg.src = url + "?t=" + new Date().getTime();
        }
        loadFrame(state.frameUrl);

        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                userImg = new Image();
                userImg.onload = () => {
                    isUserImgLoaded = true;
                    document.getElementById('no-img-msg').style.display = 'none';
                    state.zoom = Math.max(1080 / userImg.width, 1440 / userImg.height);
                    document.getElementById('zoom').value = state.zoom;
                    draw();
                };
                userImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', () => {
                state.zoom = parseFloat(document.getElementById('zoom').value);
                state.x = parseInt(document.getElementById('moveX').value);
                state.y = parseInt(document.getElementById('moveY').value);
                state.quality = parseInt(document.getElementById('quality').value) / 100;
                document.getElementById('q-label').innerText = `품질: ${document.getElementById('quality').value}%`;
                draw();
            });
        });

        function changeFrame(el, url) {
            document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            state.frameUrl = url;
            loadFrame(url);
        }

        function draw() {
            canvas.width = 1080; canvas.height = 1440;
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (isUserImgLoaded) {
                const imgW = userImg.width * state.zoom;
                const imgH = userImg.height * state.zoom;
                ctx.drawImage(userImg, (canvas.width - imgW) / 2 + state.x, (canvas.height - imgH) / 2 + state.y, imgW, imgH);
            }
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        document.getElementById('save-btn').onclick = () => {
            if (!isUserImgLoaded) return alert("사진을 업로드해주세요.");
            const format = document.querySelector('input[name="format"]:checked').value;
            const link = document.createElement('a');
            link.download = `umasnap_pro_${Date.now()}.${format}`;
            link.href = canvas.toDataURL(`image/${format}`, state.quality);
            link.click();
        };
    </script>
</body>
</html>
