<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>umasnap - 커스텀 프레임 합성기</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f8f9fa; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; }
        
        /* 프레임 선택 영역 */
        .frame-selector { display: flex; gap: 15px; justify-content: center; margin-bottom: 30px; overflow-x: auto; padding: 10px; }
        .frame-item { width: 100px; height: 100px; border: 3px solid #ddd; border-radius: 10px; cursor: pointer; transition: 0.3s; background-color: white; object-fit: contain; }
        .frame-item.active { border-color: #ff4757; transform: scale(1.1); }
        .frame-item:hover { border-color: #ffa502; }

        /* 업로드 및 결과 영역 */
        #drop-zone { border: 2px dashed #3498db; border-radius: 15px; padding: 40px; background: white; cursor: pointer; margin-bottom: 20px; }
        canvas { max-width: 100%; height: auto; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: none; margin: 20px auto; }
        
        .btn { padding: 15px 30px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 10px; cursor: pointer; display: none; margin: 10px auto; }
        #download-btn { background-color: #2ecc71; }
    </style>
</head>
<body>

    <div class="container">
        <h1>umasnap 프레임 합성</h1>
        <p>1. 적용할 프레임을 선택하세요. | 2. 사진을 업로드하세요.</p>

        <div class="frame-selector" id="frame-list">
            <img src="frame1.png" class="frame-item active" onclick="selectFrame(this, 'frame1.png')">
            <img src="frame2.png" class="frame-item" onclick="selectFrame(this, 'frame2.png')">
            <img src="frame3.png" class="frame-item" onclick="selectFrame(this, 'frame3.png')">
            </div>

        <input type="file" id="file-input" accept="image/*" style="display: none;">
        <div id="drop-zone">이곳을 클릭하거나 사진을 드래그하여 업로드</div>

        <canvas id="main-canvas"></canvas>
        <button id="download-btn" class="btn">합성된 사진 저장하기</button>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const downloadBtn = document.getElementById('download-btn');

        let selectedFrameUrl = 'frame1.png'; // 기본 선택 프레임
        let userImage = null;

        // 프레임 선택 함수
        function selectFrame(el, url) {
            document.querySelectorAll('.frame-item').forEach(img => img.classList.remove('active'));
            el.classList.add('active');
            selectedFrameUrl = url;
            if (userImage) compose(); // 사진이 이미 있으면 즉시 재합성
        }

        // 사진 업로드 처리
        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    userImage = new Image();
                    userImage.onload = compose;
                    userImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        // 핵심 합성 로직
        function compose() {
            if (!userImage) return;

            const frameImg = new Image();
            frameImg.onload = function() {
                // 1. 캔버스 크기를 사용자 사진 크기에 맞춤
                canvas.width = userImage.width;
                canvas.height = userImage.height;

                // 2. 사용자 사진 그리기 (바닥)
                ctx.drawImage(userImage, 0, 0);

                // 3. 프레임을 사진 크기에 맞춰서 덮어쓰기 (위에)
                ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);

                canvas.style.display = 'block';
                downloadBtn.style.display = 'block';
            };
            frameImg.src = selectedFrameUrl;
        }

        // 다운로드
        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = 'umasnap_result.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        };
    </script>
</body>
</html>
