<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>umasnap v5.0 - 마우스 드래그 & 4:5 고정</title>
    <style>
        :root { --primary: #ff4757; --secondary: #3498db; --success: #2ed573; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #2f3542; }
        .app-container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
        
        .panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .panel h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 15px; color: var(--secondary); }
        
        #drop-zone { border: 2px dashed var(--secondary); border-radius: 15px; padding: 30px 10px; text-align: center; color: var(--secondary); cursor: pointer; background: #f9fcff; font-weight: 600; margin-bottom: 20px; }
        #drop-zone:hover { background: #eaf6ff; }

        .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f1f2f6; }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 10px; color: #57606f; }

        input[type="range"] { width: 100%; cursor: pointer; margin-top: 5px; }

        .frame-list { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; }
        .frame-thumb { width: 65px; height: 65px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; object-fit: contain; flex-shrink: 0; }
        .frame-thumb.active { border-color: var(--primary); }

        .preview-section { background: white; padding: 25px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 70vh; }
        /* 마우스 드래그가 가능하다는 것을 알리기 위해 커서 스타일 변경 */
        canvas { max-width: 100%; max-height: 80vh; border-radius: 5px; box-shadow: 0 15px 45px rgba(0,0,0,0.2); background: #fff; cursor: grab; }
        canvas:active { cursor: grabbing; }

        #save-btn { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 20px; }
        
        @media (max-width: 1000px) { .app-container { grid-template-columns: 1fr; } .panel { position: relative; top: 0; } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="panel">
            <h3>✨ umasnap v5.0</h3>
            
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div id="drop-zone">사진을 클릭하거나 드래그하여 업로드</div>

            <div class="control-group">
                <label class="label">1. 사진 조정 (드래그 또는 슬라이더)</label>
                <div style="font-size: 11px; color: #999;">확대 / 축소</div>
                <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1">
                <div style="font-size: 11px; color: #999; margin-top: 10px;">좌우 이동 (X)</div>
                <input type="range" id="moveX" min="-2000" max="2000" value="0">
                <div style="font-size: 11px; color: #999; margin-top: 10px;">상하 이동 (Y)</div>
                <input type="range" id="moveY" min="-2000" max="2000" value="0">
            </div>

            <div class="control-group">
                <label class="label">2. 프레임 디자인</label>
                <div class="frame-list">
                    <img src="frame1.png" class="frame-thumb active" onclick="changeFrame(this, 'frame1.png')">
                    <img src="frame2.png" class="frame-thumb" onclick="changeFrame(this, 'frame2.png')">
                    <img src="frame3.png" class="frame-thumb" onclick="changeFrame(this, 'frame3.png')">
                </div>
            </div>

            <div class="control-group">
                <label class="label">3. 저장 설정 (WebP / JPG)</label>
                <div style="margin-bottom: 8px; font-size: 13px;">
                    <label><input type="radio" name="format" value="webp" checked> WebP</label>
                    <label><input type="radio" name="format" value="jpeg"> JPG</label>
                    <label><input type="radio" name="format" value="png"> PNG</label>
                </div>
                <input type="range" id="quality" min="50" max="100" step="5" value="95">
                <div id="q-label" style="font-size: 11px; color: #aaa;">저장 품질: 95%</div>
            </div>
            
            <button id="save-btn">이미지 저장하기</button>
        </div>

        <div class="preview-section">
            <canvas id="main-canvas"></canvas>
            <div id="no-img-msg" style="color: #aaa; font-size: 14px; text-align: center;">
                사진을 업로드하면 4:5 프레임 편집이 시작됩니다.<br>
                (마우스로 사진을 직접 드래그할 수 있습니다)
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        
        let frameImg = new Image();
        let userImg = new Image();
        let isUserImgLoaded = false;
        
        // 상태 관리 (비율 4:5 고정)
        let state = {
            ratio: 0.8, 
            zoom: 1,
            x: 0,
            y: 0,
            frameUrl: 'frame1.png',
            quality: 0.95
        };

        // 드래그 관련 상태
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function loadFrame(url) {
            frameImg = new Image();
            frameImg.crossOrigin = "Anonymous";
            frameImg.onload = draw;
            frameImg.src = url + "?t=" + new Date().getTime();
        }
        loadFrame(state.frameUrl);

        // --- 업로드 로직 ---
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                userImg = new Image();
                userImg.onload = () => {
                    isUserImgLoaded = true;
                    document.getElementById('no-img-msg').style.display = 'none';
                    // 초기 자동 줌
                    const baseWidth = 1200;
                    const baseHeight = baseWidth / state.ratio;
                    state.zoom = Math.max(baseWidth / userImg.width, baseHeight / userImg.height);
                    document.getElementById('zoom').value = state.zoom;
                    draw();
                };
                userImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- 마우스 드래그 기능 구현 ---
        canvas.onmousedown = (e) => {
            if (!isUserImgLoaded) return;
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;

            // 실제 캔버스 해상도와 화면 표시 크기 사이의 비율 계산
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const deltaX = (e.clientX - lastMouseX) * scaleX;
            const deltaY = (e.clientY - lastMouseY) * scaleY;

            state.x += deltaX;
            state.y += deltaY;

            // 슬라이더 값 업데이트
            document.getElementById('moveX').value = state.x;
            document.getElementById('moveY').value = state.y;

            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            draw();
        };

        window.onmouseup = () => { isDragging = false; };

        // --- 슬라이더 및 설정 변경 ---
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', () => {
                state.zoom = parseFloat(document.getElementById('zoom').value);
                state.x = parseInt(document.getElementById('moveX').value);
                state.y = parseInt(document.getElementById('moveY').value);
                state.quality = parseInt(document.getElementById('quality').value) / 100;
                document.getElementById('q-label').innerText = `저장 품질: ${document.getElementById('quality').value}%`;
                draw();
            });
        });

        function changeFrame(el, url) {
            document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            state.frameUrl = url;
            loadFrame(url);
        }

        function draw() {
            const baseWidth = 1200; 
            canvas.width = baseWidth;
            canvas.height = baseWidth / state.ratio;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isUserImgLoaded) {
                const imgW = userImg.width * state.zoom;
                const imgH = userImg.height * state.zoom;
                const startX = (canvas.width - imgW) / 2 + state.x;
                const startY = (canvas.height - imgH) / 2 + state.y;
                ctx.drawImage(userImg, startX, startY, imgW, imgH);
            }
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        document.getElementById('save-btn').onclick = () => {
            if (!isUserImgLoaded) return alert("사진을 업로드해주세요.");
            const format = document.querySelector('input[name="format"]:checked').value;
            const link = document.createElement('a');
            link.download = `umasnap_4x5_${Date.now()}.${format}`;
            try {
                link.href = canvas.toDataURL(`image/${format}`, state.quality);
                link.click();
            } catch (e) {
                alert("보안 에러가 발생했습니다. GitHub 주소로 접속해주세요.");
            }
        };
    </script>
</body>
</html>
