<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UMA Stargram</title>
    <link rel="icon" href="250605_umasnap_frame.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757; --accent: #5352ed; --success: #2ed573;
            --bg-deep: #0f0f0f; --bg-panel: rgba(25, 25, 25, 0.9);
            --text-main: #f1f2f6; --text-dim: #a4b0be; --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(45, 52, 54, 0.6);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-deep); margin: 0; color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 1400px; display: grid; grid-template-columns: 420px 1fr; height: 100vh; }
        
        .panel { background: var(--bg-panel); backdrop-filter: blur(30px); padding: 25px; border-right: 1px solid var(--border); overflow-y: auto; box-sizing: border-box; z-index: 10; scrollbar-width: thin; }
        .panel h1 { font-size: 28px; font-weight: 800; margin-bottom: 25px; letter-spacing: -1.5px; background: linear-gradient(45deg, var(--primary), #eb3b5a); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        #drop-zone { background: var(--card-bg); border: 1px dashed var(--border); border-radius: 16px; padding: 15px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 20px; font-size: 13px; font-weight: 600; }
        #drop-zone.drag-over { background: rgba(83, 82, 237, 0.2); border-color: var(--accent); }

        .section-header { font-size: 10px; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 0 12px 0; display: flex; align-items: center; gap: 8px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        
        .frame-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; background: var(--card-bg); padding: 10px; border-radius: 16px; }
        .frame-thumb { width: 100%; aspect-ratio: 1/1; border-radius: 6px; cursor: pointer; background: #fff; border: 2px solid transparent; transition: 0.2s; opacity: 0.5; }
        .frame-thumb.active { border-color: var(--primary); opacity: 1; transform: scale(1.05); box-shadow: 0 0 15px rgba(255, 71, 87, 0.3); }
        
        .tool-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .tool-btn { flex: 1; background: var(--card-bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.2s; }

        .control-item { margin-bottom: 15px; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-dim); margin-bottom: 5px; }

        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type="range"]::-webkit-slider-runnable-track { height: 3px; background: var(--border); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: var(--primary); margin-top: -6.5px; cursor: pointer; border: 2px solid var(--bg-deep); }
        
        .main-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(circle at center, #1e1e1e 0%, #0a0a0a 100%); flex: 1; padding: 20px; position: relative; }
        canvas { max-width: 95%; max-height: 85vh; border-radius: 4px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); cursor: grab; touch-action: none; }
        
        #save-btn { background: linear-gradient(135deg, var(--primary), #eb3b5a); color: white; border: none; padding: 16px; border-radius: 50px; font-size: 15px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 15px; box-shadow: 0 10px 25px rgba(255, 71, 87, 0.3); }

        .chip-group { display: flex; gap: 6px; margin-bottom: 10px; }
        .chip { flex: 1; text-align: center; padding: 8px; border-radius: 10px; background: var(--card-bg); font-size: 11px; cursor: pointer; border: 1px solid var(--border); }
        .chip.active { background: var(--accent); border-color: var(--accent); font-weight: 800; }

        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; overflow-y: auto; } .panel { height: auto; border-right: none; } .main-stage { min-height: 70vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="panel">
            <h1>UMA Stargram</h1>
            
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">📁 이미지 불러오기 (Drag & Drop)</div>

            <div class="section-header">Frames</div>
            <div class="frame-grid">
                <img src="250605_umasnap_frame.png" class="frame-thumb active" onclick="changeFrame(this, '250605_umasnap_frame.png')">
                <img src="250605_umasnap_frame_sw.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_sw.png')">
                <img src="250605_umasnap_frame_ss.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ss.png')">
                <img src="250605_umasnap_frame_tt.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_tt.png')">
                <img src="250605_umasnap_frame_ms.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ms.png')">
                <img src="250605_umasnap_frame_oc.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_oc.png')">
                <img src="250605_umasnap_frame_ts.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ts.png')">
                <img src="250605_umasnap_frame_mm.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_mm.png')">
                <img src="250605_umasnap_frame_sr.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_sr.png')">
                <img src="250605_umasnap_frame_rs.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_rs.png')">
                <img src="260403_Almond_Eye.png" class="frame-thumb" onclick="changeFrame(this, '260403_Almond_Eye.png')">
                <img src="Untitled112_20260228153023.png" class="frame-thumb" onclick="changeFrame(this, 'Untitled112_20260228153023.png')">
                <img src="Untitled110_20260227203616.png" class="frame-thumb" onclick="changeFrame(this, 'Untitled110_20260227203616.png')">
                <img src="Untitled113_20260301161431.png" class="frame-thumb" onclick="changeFrame(this, 'Untitled113_20260301161431.png')">
                <img src="Untitled127_20260118151511.png" class="frame-thumb" onclick="changeFrame(this, 'Untitled127_20260118151511.png')">
                <img src="Untitled128_20260118151741.png" class="frame-thumb" onclick="changeFrame(this, 'Untitled128_20260118151741.png')">
                <img src="Untitled124_20260117233217.png" class="frame-thumb" onclick="changeFrame(this, 'Untitled124_20260117233217.png')">
                <img src="Untitled116_20260107095434.png" class="frame-thumb" onclick="changeFrame(this, 'Untitled116_20260107095434.png')">
                
            </div>

            <div class="section-header">Quick Tools</div>
            <div class="tool-group">
                <button class="tool-btn" onclick="rotatePhoto()">🔄 90° 회전</button>
                <button class="tool-btn" onclick="flipPhoto()">↔️ 좌우 반전</button>
            </div>

            <div class="section-header">Adjustments</div>
            <div class="control-item">
                <div class="label-row"><span>Zoom</span><span id="z-val">2.5x</span></div>
                <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="2.5">
            </div>
            <div class="control-item">
                <div class="label-row"><span>Y Position</span><span id="y-val">0</span></div>
                <input type="range" id="moveY" min="-2000" max="2000" value="0">
            </div>
            <div class="control-item">
                <div class="label-row"><span>X Position</span><span id="x-val">0</span></div>
                <input type="range" id="moveX" min="-2000" max="2000" value="0">
            </div>
            <button onclick="resetPosition()" style="background:none; border:none; color:var(--accent); font-size:11px; cursor:pointer; width:100%; text-align:right;">설정 초기화 (R)</button>

            <div class="section-header">Export Settings</div>
            <div class="chip-group">
                <label class="chip active"><input type="radio" name="format" value="webp" checked style="display:none"> WebP</label>
                <label class="chip"><input type="radio" name="format" value="jpeg" style="display:none"> JPEG</label>
                <label class="chip"><input type="radio" name="format" value="png" style="display:none"> PNG</label>
            </div>
            <div class="control-item">
                <div class="label-row"><span>저장 품질 (Quality)</span><span id="q-label">95%</span></div>
                <input type="range" id="quality" min="50" max="100" step="5" value="95">
            </div>
            <button id="save-btn">EXPORT STARGRAM (S)</button>
        </aside>

        <main class="main-stage" id="main-stage">
            <canvas id="main-canvas"></canvas>
            <div style="font-size: 11px; color: var(--text-dim); margin-top: 15px;">Wheel to Zoom | Double-click to Reset</div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const mainStage = document.getElementById('main-stage');

        let frameImg = new Image();
        let userImg = new Image();
        let isUserImgLoaded = false;
        
        let state = { 
            ratio: 0.75, zoom: 2.5, x: 0, y: 0, 
            rotate: 0, flip: 1,
            frameUrl: '250605_umasnap_frame.png', quality: 0.95 
        };

        function rotatePhoto() { state.rotate = (state.rotate + 90) % 360; draw(); }
        function flipPhoto() { state.flip *= -1; draw(); }

        // 드래그 앤 드롭
        ['dragenter', 'dragover'].forEach(n => {
            dropZone.addEventListener(n, e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            mainStage.addEventListener(n, e => { e.preventDefault(); mainStage.classList.add('drag-over'); });
        });
        ['dragleave', 'drop'].forEach(n => {
            dropZone.addEventListener(n, e => { e.preventDefault(); dropZone.classList.remove('drag-over'); });
            mainStage.addEventListener(n, e => { e.preventDefault(); mainStage.classList.remove('drag-over'); });
        });
        [dropZone, mainStage].forEach(t => {
            t.addEventListener('drop', e => { const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) handleFile(f); });
        });

        fileInput.onchange = e => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                userImg = new Image();
                userImg.onload = () => { isUserImgLoaded = true; draw(); };
                userImg.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 's') document.getElementById('save-btn').click();
            if (e.key.toLowerCase() === 'r') resetPosition();
        });

        canvas.addEventListener('wheel', e => {
            if (!isUserImgLoaded) return;
            e.preventDefault();
            state.zoom = Math.min(Math.max(state.zoom + (e.deltaY > 0 ? -0.1 : 0.1), 0.1), 5);
            syncSliders();
            draw();
        }, { passive: false });

        canvas.ondblclick = () => { if (isUserImgLoaded) resetPosition(); draw(); };

        let isDragging = false;
        let lastX = 0; let lastY = 0;
        let initialPinchDist = 0; let initialZoom = 1;
        let initialCenterX = 0; let initialCenterY = 0;
        let initialOffsetX = 0; let initialOffsetY = 0;

        canvas.addEventListener('touchstart', e => {
            if (!isUserImgLoaded) return;
            if (e.touches.length === 1) {
                isDragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialZoom = state.zoom;
                initialCenterX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                initialCenterY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                initialOffsetX = state.x; initialOffsetY = state.y;
            }
        }, { passive: false });

        canvas.addEventListener('touchmove', e => {
            if (!isUserImgLoaded) return;
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                state.zoom = Math.min(Math.max(initialZoom * (dist / initialPinchDist), 0.1), 5);
                const curCX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const curCY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
                state.x = initialOffsetX + (curCX - initialCenterX) * (canvas.width / rect.width);
                state.y = initialOffsetY + (curCY - initialCenterY) * (canvas.height / rect.height);
                syncSliders();
            } else if (isDragging && e.touches.length === 1) {
                state.x += (e.touches[0].clientX - lastX) * (canvas.width / rect.width);
                state.y += (e.touches[0].clientY - lastY) * (canvas.height / rect.height);
                lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
                syncSliders();
            }
            draw();
        }, { passive: false });

        canvas.addEventListener('touchend', () => { isDragging = false; initialPinchDist = 0; });
        canvas.onmousedown = e => { if (isUserImgLoaded) { isDragging = true; lastX = e.clientX; lastY = e.clientY; } };
        window.onmousemove = e => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            state.x += (e.clientX - lastX) * (canvas.width / rect.width);
            state.y += (e.clientY - lastY) * (canvas.height / rect.height);
            lastX = e.clientX; lastY = e.clientY;
            syncSliders();
            draw();
        };
        window.onmouseup = () => isDragging = false;

        function loadFrame(url) {
            frameImg = new Image();
            frameImg.crossOrigin = "Anonymous";
            frameImg.onload = draw;
            frameImg.src = url + "?t=" + new Date().getTime();
        }
        loadFrame(state.frameUrl);

        function changeFrame(el, url) {
            document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            state.frameUrl = url;
            loadFrame(url);
        }

        function resetPosition() {
            state.x = 0; state.y = 0; state.zoom = 2.5; state.rotate = 0; state.flip = 1;
            syncSliders();
            draw();
        }

        function syncSliders() {
            document.getElementById('moveX').value = state.x;
            document.getElementById('moveY').value = state.y;
            document.getElementById('zoom').value = state.zoom;
            document.getElementById('z-val').innerText = state.zoom.toFixed(2) + 'x';
            document.getElementById('x-val').innerText = Math.round(state.x);
            document.getElementById('y-val').innerText = Math.round(state.y);
            document.getElementById('q-label').innerText = Math.round(state.quality * 100) + '%';
        }

        document.querySelectorAll('input[type="range"]').forEach(i => i.addEventListener('input', (e) => {
            state.zoom = parseFloat(document.getElementById('zoom').value);
            state.x = parseInt(document.getElementById('moveX').value);
            state.y = parseInt(document.getElementById('moveY').value);
            if (e.target.id === 'quality') state.quality = parseInt(e.target.value) / 100;
            syncSliders();
            draw();
        }));

        document.querySelectorAll('.chip').forEach(c => c.onclick = function() {
            document.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
            this.classList.add('active');
        });

        function draw() {
            canvas.width = 1080; canvas.height = 1440;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (isUserImgLoaded) {
                ctx.save();
                ctx.translate(canvas.width / 2 + state.x, canvas.height / 2 + state.y);
                ctx.scale(state.flip, 1);
                ctx.rotate(state.rotate * Math.PI / 180);
                const imgW = userImg.width * state.zoom;
                const imgH = userImg.height * state.zoom;
                ctx.drawImage(userImg, -imgW / 2, -imgH / 2, imgW, imgH);
                ctx.restore();
            }
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        document.getElementById('save-btn').onclick = () => {
            if (!isUserImgLoaded) return;
            const format = document.querySelector('input[name="format"]:checked').value;
            const link = document.createElement('a');
            link.download = `UMASTARGRAM_${Date.now()}.${format}`;
            // 사용자 설정 품질 적용
            link.href = canvas.toDataURL(`image/${format}`, state.quality);
            link.click();
        };
    </script>
</body>
</html>
