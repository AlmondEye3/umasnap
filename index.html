<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>umasnap v3.2 - нФДл†ИмЮД мЩДл≤љ л≥µкµђ л≤Дм†Д</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        :root { --primary: #ff4757; --secondary: #3498db; --success: #2ed573; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #2f3542; }
        .app-container { max-width: 1300px; margin: 0 auto; display: grid; grid-template-columns: 380px 1fr; gap: 25px; }
        
        .panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .panel h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 15px; color: var(--secondary); }
        
        #drop-zone { border: 2px dashed var(--secondary); border-radius: 15px; padding: 40px 15px; text-align: center; color: var(--secondary); cursor: pointer; background: #f9fcff; font-weight: 600; margin-bottom: 15px; }
        #drop-zone.dragover { background: var(--secondary); color: white; }

        .control-group { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #f1f2f6; }
        .label { display: block; font-size: 14px; font-weight: 700; margin-bottom: 12px; }

        .ratio-btns { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
        .ratio-btn { padding: 12px; border: 2px solid #eee; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .ratio-btn.active { background: var(--secondary); color: white; border-color: var(--secondary); }

        #apply-crop-btn { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; display: none; margin-top: 10px; }
        
        .frame-list { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; }
        .frame-thumb { width: 65px; height: 65px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; object-fit: contain; flex-shrink: 0; }
        .frame-thumb.active { border-color: var(--primary); }

        .preview-section { background: white; padding: 25px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; min-height: 60vh; }
        .crop-wrapper { width: 100%; max-height: 70vh; display: none; border-radius: 10px; overflow: hidden; }
        #image-to-crop { max-width: 100%; }
        #final-canvas { max-width: 100%; max-height: 75vh; box-shadow: 0 15px 45px rgba(0,0,0,0.2); display: none; border-radius: 5px; }

        #save-btn { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 20px; display: none; }
        
        @media (max-width: 1000px) { .app-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="panel">
            <h3>вЬ® umasnap v3.2</h3>
            
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div id="drop-zone">мВђмІД нБіл¶≠/лУЬлЮШкЈЄ мЧЕл°ЬлУЬ</div>

            <div class="control-group" id="step1-ui" style="display: none;">
                <label class="label">1. мВђмІД лєДмЬ® мД†нГЭ (к≥†м†Х)</label>
                <div class="ratio-btns" id="ratio-btns">
                    <button class="ratio-btn active" data-ratio="0.8">4:5 (мЭЄмК§нГА)</button>
                    <button class="ratio-btn" data-ratio="1">1:1 (м†ХмВђк∞БнШХ)</button>
                    <button class="ratio-btn" data-ratio="0.75">3:4 (нПілЭЉл°ЬмЭілУЬ)</button>
                    <button class="ratio-btn" data-ratio="1.77">16:9 (мЩАмЭілУЬ)</button>
                </div>
                <button id="apply-crop-btn">вЬВпЄП мВђмІД мЮРл•ікЄ∞ мЩДл£М</button>
            </div>

            <div id="step2-ui" style="display: none;">
                <div class="control-group">
                    <label class="label">2. нФДл†ИмЮД мД†нГЭ</label>
                    <div class="frame-list">
                        <img src="frame1.png" class="frame-thumb active" onclick="changeFrame(this, 'frame1.png')">
                        <img src="frame2.png" class="frame-thumb" onclick="changeFrame(this, 'frame2.png')">
                        <img src="frame3.png" class="frame-thumb" onclick="changeFrame(this, 'frame3.png')">
                    </div>
                </div>

                <div class="control-group">
                    <label class="label">3. лВіл≥ілВікЄ∞ мД§м†Х</label>
                    <div style="margin-bottom: 10px; font-size: 14px;">
                        <label><input type="radio" name="format" value="webp" checked> WebP</label>
                        <label><input type="radio" name="format" value="jpeg"> JPG</label>
                        <label><input type="radio" name="format" value="png"> PNG</label>
                    </div>
                    <input type="range" id="quality" min="50" max="100" value="95">
                    <div id="q-label" style="font-size: 12px; color: #777;">нТИмІИ: 95%</div>
                </div>
                
                <button id="save-btn">мЭілѓЄмІА м†АмЮ•нХШкЄ∞</button>
            </div>
            <button onclick="location.reload()" style="width:100%; border:none; background:none; color:#aaa; cursor:pointer; font-size:11px; margin-top:20px;">міИкЄ∞нЩФ</button>
        </div>

        <div class="preview-section">
            <div id="msg" style="margin-top: 150px; color: #aaa;">мВђмІДмЭД мЧЕл°ЬлУЬнХім£ЉмДЄмЪФ.</div>
            <div class="crop-wrapper" id="crop-wrapper">
                <img id="image-to-crop">
            </div>
            <canvas id="final-canvas"></canvas>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const imageToCrop = document.getElementById('image-to-crop');
        const finalCanvas = document.getElementById('final-canvas');
        const ctx = finalCanvas.getContext('2d');
        
        let cropper = null;
        let croppedCanvas = null;
        let frameImg = new Image();
        
        let state = {
            ratio: 0.8,
            frameUrl: 'frame1.png',
            quality: 0.95
        };

        // --- нФДл†ИмЮД л°ЬлУЬ нХ®мИШ (к∞АмЮ• мХИм†ДнХЬ л∞©мЛЭ) ---
        function setFrame(url) {
            state.frameUrl = url;
            frameImg = new Image();
            // к∞ЩмЭА м†АмЮ•мЖМ(GitHub)лЭЉл©і crossOriginмЭі мЧЖмЦімХЉ л°Ьмїђ нЕМмК§нКЄ мЛЬ мЧРлЯђк∞А лНЬ лВ©лЛИлЛ§.
            // нХШмІАлІМ м†АмЮ•нХШкЄ∞(toDataURL) мЧРлЯђк∞А лВШл©і мХДлЮШ м£ЉмДЭмЭД нХім†ЬнХШмДЄмЪФ.
            // frameImg.crossOrigin = "Anonymous"; 
            frameImg.onload = () => {
                console.log("нФДл†ИмЮД л°ЬлУЬ мЩДл£М:", url);
                draw();
            };
            frameImg.onerror = () => alert("нФДл†ИмЮД нММмЭЉ(" + url + ")мЭД м∞ЊмЭД мИШ мЧЖмКµлЛИлЛ§. GitHubмЧР мШђл¶ђмЕ®лВШмЪФ?");
            frameImg.src = url;
        }

        // міИкЄ∞ нФДл†ИмЮД мД§м†Х
        setFrame(state.frameUrl);

        // --- мЧЕл°ЬлУЬ м≤Шл¶ђ ---
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                imageToCrop.src = e.target.result;
                document.getElementById('msg').style.display = 'none';
                document.getElementById('crop-wrapper').style.display = 'block';
                document.getElementById('step1-ui').style.display = 'block';
                document.getElementById('apply-crop-btn').style.display = 'block';
                dropZone.style.display = 'none';

                if (cropper) cropper.destroy();
                cropper = new Cropper(imageToCrop, {
                    aspectRatio: state.ratio,
                    viewMode: 1,
                    autoCropArea: 1
                });
            };
            reader.readAsDataURL(file);
        }

        // --- лєДмЬ® л≥Ак≤љ ---
        document.getElementById('ratio-btns').onclick = (e) => {
            const btn = e.target.closest('.ratio-btn');
            if (!btn || !cropper) return;
            document.querySelectorAll('.ratio-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            state.ratio = parseFloat(btn.dataset.ratio);
            cropper.setAspectRatio(state.ratio);
        };

        // --- мЮРл•ікЄ∞ мЩДл£М л≤ДнКЉ ---
        document.getElementById('apply-crop-btn').onclick = () => {
            if (!cropper) return;
            // к≥†нХімГБлПД мЮРл•ікЄ∞ лН∞мЭінД∞ мГЭмД±
            croppedCanvas = cropper.getCroppedCanvas({ maxWidth: 2000, maxHeight: 2000 });
            
            cropper.destroy();
            cropper = null;
            
            document.getElementById('crop-wrapper').style.display = 'none';
            document.getElementById('step1-ui').style.display = 'none';
            document.getElementById('step2-ui').style.display = 'block';
            finalCanvas.style.display = 'block';
            document.getElementById('save-btn').style.display = 'block';
            
            draw();
        };

        function changeFrame(el, url) {
            document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            setFrame(url);
        }

        // --- мµЬмҐЕ нХ©мД± (лєДмЬ® к≥†м†Х нХµмЛђ л°ЬмІБ) ---
        function draw() {
            if (!croppedCanvas || !frameImg.complete) return;

            // 1. мЇФл≤ДмК§ нБђкЄ∞л•Љ мД†нГЭнХЬ лєДмЬ®мЧР лІЮмґ∞ к∞Хм†Ьл°Ь к≥†м†Х (м∞МкЈЄлЯђмІР л∞©мІА)
            const baseWidth = 1200;
            finalCanvas.width = baseWidth;
            finalCanvas.height = baseWidth / state.ratio;

            // 2. л∞∞к≤љ мІАмЪ∞кЄ∞/м±ДмЪ∞кЄ∞
            ctx.clearRect(0, 0, finalCanvas.width, finalCanvas.height);
            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, finalCanvas.width, finalCanvas.height);

            // 3. мВђмІД кЈЄл¶ђкЄ∞ (мЇФл≤ДмК§ нБђкЄ∞мЧР лІЮмґ∞ кљЙ м±ДмЫА)
            ctx.drawImage(croppedCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

            // 4. нФДл†ИмЮД кЈЄл¶ђкЄ∞ (мВђмІД мЬДмЧР мЇФл≤ДмК§ нБђкЄ∞мЧР лІЮмґ∞ кљЙ м±ДмЫА)
            ctx.drawImage(frameImg, 0, 0, finalCanvas.width, finalCanvas.height);
        }

        // нТИмІИ л∞П м†АмЮ•
        document.getElementById('quality').oninput = (e) => {
            state.quality = e.target.value / 100;
            document.getElementById('q-label').innerText = `нТИмІИ: ${e.target.value}%`;
        };

        document.getElementById('save-btn').onclick = () => {
            const format = document.querySelector('input[name="format"]:checked').value;
            const link = document.createElement('a');
            link.download = `umasnap_result_${Date.now()}.${format}`;
            
            try {
                // 95% нТИмІИл°Ь лН∞мЭінД∞ мґФмґЬ
                link.href = finalCanvas.toDataURL(`image/${format}`, state.quality);
                link.click();
            } catch (e) {
                alert("л≥імХИ мЧРлЯђк∞А л∞ЬмГЭнЦИмКµлЛИлЛ§. GitHubмЧР нММмЭЉмЭД мШђл¶∞ лТ§ м£ЉмЖМл°Ь м†СмЖНнХімДЬ нЕМмК§нКЄнХі м£ЉмДЄмЪФ!");
                console.error(e);
            }
        };
    </script>
</body>
</html>
