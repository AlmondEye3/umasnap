<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMA snap - UMA Snap 프레임</title>
    <style>
        :root { --primary: #ff4757; --secondary: #3498db; --success: #2ed573; --bg: #f1f2f6; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #2f3542; }
        .app-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 400px 1fr; gap: 25px; }
        
        /* 패널 설정 */
        .panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); height: fit-content; position: sticky; top: 20px; }
        .panel h3 { margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 15px; color: var(--secondary); }
        
        #drop-zone { border: 2px dashed var(--secondary); border-radius: 15px; padding: 25px 10px; text-align: center; color: var(--secondary); cursor: pointer; background: #f9fcff; font-weight: 600; margin-bottom: 20px; font-size: 14px; }
        #drop-zone:hover { background: #eaf6ff; }

        .control-group { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #f1f2f6; }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 12px; color: #57606f; }

        input[type="range"] { width: 100%; cursor: pointer; margin-top: 5px; }

        /* 프레임 선택창: 격자 세로 스크롤 */
        .frame-list { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            max-height: 350px; 
            overflow-y: auto; 
            padding: 10px; 
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 12px;
        }
        .frame-list::-webkit-scrollbar { width: 6px; }
        .frame-list::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }

        .frame-thumb { width: 100%; aspect-ratio: 1/1; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; object-fit: contain; background: white; transition: 0.2s; }
        .frame-thumb.active { border-color: var(--primary); transform: scale(1.05); box-shadow: 0 4px 10px rgba(255, 71, 87, 0.2); }

        /* 미리보기 영역 */
        .preview-section { background: white; padding: 25px; border-radius: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 80vh; }
        canvas { max-width: 100%; max-height: 85vh; border-radius: 5px; box-shadow: 0 20px 50px rgba(0,0,0,0.25); background: #fff; cursor: grab; }
        canvas:active { cursor: grabbing; }

        #save-btn { background: var(--success); color: white; border: none; padding: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-size: 18px; font-weight: bold; margin-top: 20px; }
        
        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; } .panel { position: relative; top: 0; } }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="panel">
            <h3>✨ umasnap v6.1</h3>
            
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div id="drop-zone">사진을 클릭하거나 드래그하여 업로드</div>

            <div class="control-group">
                <label class="label">1. 프레임 디자인 선택</label>
                <div class="frame-list">
                    <img src="250605_umasnap_frame_sw.png" class="frame-thumb active" onclick="changeFrame(this, '250605_umasnap_frame_sw.png')">
                    <img src="250605_umasnap_frame_ss.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ss.png')">
                    <img src="250605_umasnap_frame_tt.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_tt.png')">
                    <img src="250605_umasnap_frame_ms.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ms.png')">
                    <img src="250605_umasnap_frame_oc.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_oc.png')">
                    <img src="250605_umasnap_frame_ts.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ts.png')">
                    <img src="250605_umasnap_frame_mm.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_mm.png')">
                    <img src="250605_umasnap_frame_sr.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_sr.png')">
                    <img src="250605_umasnap_frame_rs.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_rs.png')">
                </div>
            </div>

            <div class="control-group">
                <label class="label">2. 사진 조정 (드래그 지원)</label>
                <div style="font-size: 11px; color: #999;">Zoom</div>
                <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1">
                <div style="font-size: 11px; color: #999; margin-top: 10px;">X / Y 이동 (슬라이더)</div>
                <input type="range" id="moveX" min="-2000" max="2000" value="0">
                <input type="range" id="moveY" min="-2000" max="2000" value="0">
            </div>

            <div class="control-group">
                <label class="label">3. 저장 설정 (1080x1440)</label>
                <div style="margin-bottom: 8px; font-size: 13px;">
                    <label><input type="radio" name="format" value="webp" checked> WebP</label>
                    <label><input type="radio" name="format" value="jpeg"> JPG</label>
                    <label><input type="radio" name="format" value="png"> PNG</label>
                </div>
                <input type="range" id="quality" min="50" max="100" step="5" value="95">
                <div id="q-label" style="font-size: 11px; color: #aaa;">저장 품질: 95%</div>
            </div>
            
            <button id="save-btn">이미지 저장하기</button>
        </div>

        <div class="preview-section">
            <canvas id="main-canvas"></canvas>
            <div id="no-img-msg" style="color: #aaa; font-size: 14px; text-align: center; margin-top: 20px;">
                사진을 업로드하여 편집을 시작하세요. (1080x1440 고정)<br>
                마우스로 사진을 직접 잡고 옮길 수 있습니다.
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        
        let frameImg = new Image();
        let userImg = new Image();
        let isUserImgLoaded = false;
        
        // 상태 관리 (1080x1440 = 0.75 비율)
        let state = {
            ratio: 0.75, 
            zoom: 1,
            x: 0,
            y: 0,
            frameUrl: '250605_umasnap_frame_sw.png', // 첫 번째 프레임으로 기본값 설정
            quality: 0.95
        };

        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        // 프레임 로드 함수
        function loadFrame(url) {
            frameImg = new Image();
            frameImg.crossOrigin = "Anonymous";
            frameImg.onload = draw;
            frameImg.src = url + "?t=" + new Date().getTime();
        }
        loadFrame(state.frameUrl);

        // --- 업로드 로직 ---
        dropZone.onclick = () => fileInput.click();
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('dragover'); };
        dropZone.ondragleave = () => dropZone.classList.remove('dragover');
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        };
        fileInput.onchange = (e) => handleFile(e.target.files[0]);

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                userImg = new Image();
                userImg.onload = () => {
                    isUserImgLoaded = true;
                    document.getElementById('no-img-msg').style.display = 'none';
                    // 초기 자동 줌
                    state.zoom = Math.max(1080 / userImg.width, 1440 / userImg.height);
                    document.getElementById('zoom').value = state.zoom;
                    draw();
                };
                userImg.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // --- 마우스 드래그 ---
        canvas.onmousedown = (e) => {
            if (!isUserImgLoaded) return;
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        };

        window.onmousemove = (e) => {
            if (!isDragging) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const deltaX = (e.clientX - lastMouseX) * scaleX;
            const deltaY = (e.clientY - lastMouseY) * scaleY;

            state.x += deltaX;
            state.y += deltaY;

            document.getElementById('moveX').value = state.x;
            document.getElementById('moveY').value = state.y;

            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
            draw();
        };

        window.onmouseup = () => { isDragging = false; };

        // --- 컨트롤 업데이트 ---
        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', () => {
                state.zoom = parseFloat(document.getElementById('zoom').value);
                state.x = parseInt(document.getElementById('moveX').value);
                state.y = parseInt(document.getElementById('moveY').value);
                state.quality = parseInt(document.getElementById('quality').value) / 100;
                document.getElementById('q-label').innerText = `저장 품질: ${document.getElementById('quality').value}%`;
                draw();
            });
        });

        function changeFrame(el, url) {
            document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            state.frameUrl = url;
            loadFrame(url);
        }

        function draw() {
            canvas.width = 1080;
            canvas.height = 1440;

            ctx.fillStyle = "#ffffff";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (isUserImgLoaded) {
                const imgW = userImg.width * state.zoom;
                const imgH = userImg.height * state.zoom;
                const startX = (canvas.width - imgW) / 2 + state.x;
                const startY = (canvas.height - imgH) / 2 + state.y;
                ctx.drawImage(userImg, startX, startY, imgW, imgH);
            }
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        document.getElementById('save-btn').onclick = () => {
            if (!isUserImgLoaded) return alert("사진을 업로드해주세요.");
            const format = document.querySelector('input[name="format"]:checked').value;
            const link = document.createElement('a');
            link.download = `umasnap_1080x1440_${Date.now()}.${format}`;
            try {
                link.href = canvas.toDataURL(`image/${format}`, state.quality);
                link.click();
            } catch (e) {
                alert("보안 에러가 발생했습니다. GitHub 주소로 접속해주세요.");
            }
        };
    </script>
</body>
</html>
