<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UMA Snap</title>
    <link rel="icon" href="app_icon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757; --accent: #5352ed; --success: #2ed573;
            --bg-deep: #0f0f0f; --bg-panel: rgba(30, 30, 30, 0.8);
            --text-main: #f1f2f6; --text-dim: #a4b0be; --border: rgba(255, 255, 255, 0.1);
            --card-bg: rgba(47, 53, 66, 0.5);
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-deep); margin: 0; color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        .app-container { width: 100%; max-width: 1400px; display: grid; grid-template-columns: 420px 1fr; height: 100vh; }
        .panel { background: var(--bg-panel); backdrop-filter: blur(20px); padding: 30px; border-right: 1px solid var(--border); overflow-y: auto; box-sizing: border-box; }
        .panel h1 { font-size: 24px; font-weight: 800; margin-bottom: 30px; letter-spacing: -1px; background: linear-gradient(45deg, var(--primary), #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .section-header { font-size: 11px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        #drop-zone { background: var(--card-bg); border: 1px dashed var(--border); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; margin-bottom: 30px; }
        #drop-zone:hover { background: rgba(83, 82, 237, 0.1); }
        .frame-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; background: var(--card-bg); padding: 12px; border-radius: 16px; }
        .frame-thumb { width: 100%; aspect-ratio: 1/1; border-radius: 8px; cursor: pointer; background: #fff; border: 2px solid transparent; transition: 0.2s; opacity: 0.6; }
        .frame-thumb.active { border-color: var(--primary); opacity: 1; transform: scale(1.05); }
        .main-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; background-image: radial-gradient(circle at center, #1e1e1e 0%, #0f0f0f 100%); flex: 1; padding: 40px; }
        canvas { max-width: 95%; max-height: 85vh; border-radius: 4px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); cursor: grab; touch-action: none; }
        #save-btn { background: linear-gradient(135deg, var(--primary), #eb3b5a); color: white; border: none; padding: 18px; border-radius: 50px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 25px; box-shadow: 0 10px 30px rgba(255, 71, 87, 0.3); }
        .chip-group { display: flex; gap: 8px; margin-bottom: 15px; }
        .chip { padding: 8px 16px; border-radius: 20px; background: var(--card-bg); font-size: 11px; cursor: pointer; border: 1px solid var(--border); }
        .chip.active { background: var(--accent); border-color: var(--accent); }
        input[type="range"] { -webkit-appearance: none; width: 100%; background: transparent; margin: 10px 0; }
        input[type="range"]::-webkit-slider-runnable-track { height: 4px; background: var(--border); border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; height: 18px; width: 18px; border-radius: 50%; background: var(--primary); margin-top: -7px; box-shadow: 0 0 10px rgba(255,71,87,0.4); }
        @media (max-width: 1100px) { .app-container { grid-template-columns: 1fr; overflow-y: auto; } .panel { height: auto; position: static; } .main-stage { min-height: 60vh; } }
    </style>
</head>
<body>
    <div class="app-container">
        <aside class="panel">
            <h1>UMA Snap</h1>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <div id="drop-zone" onclick="document.getElementById('file-input').click()">이미지 라이브러리 열기</div>

            <div class="section-header">Frames</div>
            <div class="frame-grid">
                <img src="250605_umasnap_frame_sw.png" class="frame-thumb active" onclick="changeFrame(this, '250605_umasnap_frame_sw.png')">
                <img src="250605_umasnap_frame_ss.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ss.png')">
                <img src="250605_umasnap_frame_tt.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_tt.png')">
                <img src="250605_umasnap_frame_ms.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ms.png')">
                <img src="250605_umasnap_frame_oc.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_oc.png')">
                <img src="250605_umasnap_frame_ts.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_ts.png')">
                <img src="250605_umasnap_frame_mm.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_mm.png')">
                <img src="250605_umasnap_frame_sr.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_sr.png')">
                <img src="250605_umasnap_frame_rs.png" class="frame-thumb" onclick="changeFrame(this, '250605_umasnap_frame_rs.png')">
            </div>

            <div style="margin-top:25px" class="section-header">Adjustments</div>
            <div style="font-size:11px; color:var(--text-dim)">Zoom (Centered by Default)</div>
            <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="2.5">
            <div style="font-size:11px; color:var(--text-dim); margin-top:10px">Position (Double-click to Center)</div>
            <input type="range" id="moveX" min="-2000" max="2000" value="0">
            <input type="range" id="moveY" min="-2000" max="2000" value="0">
            <button onclick="resetPosition()" style="background:none; border:none; color:var(--accent); font-size:11px; cursor:pointer; padding-top:10px;">Reset View</button>

            <div style="margin-top:25px" class="section-header">Export</div>
            <div class="chip-group">
                <label class="chip active"><input type="radio" name="format" value="webp" checked style="display:none"> WebP</label>
                <label class="chip"><input type="radio" name="format" value="jpeg" style="display:none"> JPEG</label>
                <label class="chip"><input type="radio" name="format" value="png" style="display:none"> PNG</label>
            </div>
            <input type="range" id="quality" min="50" max="100" step="5" value="95">
            <button id="save-btn">EXPORT SNAP</button>
        </aside>

        <main class="main-stage">
            <canvas id="main-canvas"></canvas>
            <div style="font-size: 12px; color: var(--text-dim); margin-top: 15px;">Wheel to Zoom | Double-click to Fit</div>
        </main>
    </div>

    <script>
        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const fileInput = document.getElementById('file-input');
        let frameImg = new Image();
        let userImg = new Image();
        let isUserImgLoaded = false;
        
        // 초기 Zoom 상태를 중앙값인 2.5로 설정
        let state = { ratio: 0.75, zoom: 2.5, x: 0, y: 0, frameUrl: '250605_umasnap_frame_sw.png', quality: 0.95 };

        // 마우스 휠 줌
        canvas.addEventListener('wheel', (e) => {
            if (!isUserImgLoaded) return;
            e.preventDefault();
            const delta = e.deltaY > 0 ? -0.05 : 0.05;
            state.zoom = Math.min(Math.max(state.zoom + delta, 0.1), 5);
            document.getElementById('zoom').value = state.zoom;
            draw();
        }, { passive: false });

        // 더블 클릭 초기화
        canvas.ondblclick = () => { if (!isUserImgLoaded) return; resetPosition(); draw(); };

        function loadFrame(url) {
            frameImg = new Image();
            frameImg.crossOrigin = "Anonymous";
            frameImg.onload = draw;
            frameImg.src = url + "?t=" + new Date().getTime();
        }
        loadFrame(state.frameUrl);

        fileInput.onchange = (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                userImg = new Image();
                userImg.onload = () => {
                    isUserImgLoaded = true;
                    // 사진 불러올 때 줌을 강제로 줄이지 않고 중앙(2.5) 상태를 유지하거나
                    // 원하신다면 중앙값으로 슬라이더를 세팅합니다.
                    document.getElementById('zoom').value = state.zoom;
                    draw();
                };
                userImg.src = ev.target.result;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        let isDragging = false;
        let lastX = 0; let lastY = 0;
        let initialPinchDist = 0; let initialZoom = 1;

        function startDrag(x, y) { if (!isUserImgLoaded) return; isDragging = true; lastX = x; lastY = y; }
        function handleMove(x, y, e = null) {
            if (e && e.touches && e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                if (!initialPinchDist) initialPinchDist = dist;
                state.zoom = Math.min(Math.max(initialZoom * (dist / initialPinchDist), 0.1), 5);
                document.getElementById('zoom').value = state.zoom;
            } else if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                state.x += (x - lastX) * (canvas.width / rect.width);
                state.y += (y - lastY) * (canvas.height / rect.height);
                lastX = x; lastY = y;
                document.getElementById('moveX').value = state.x;
                document.getElementById('moveY').value = state.y;
            }
            draw();
        }

        canvas.onmousedown = (e) => startDrag(e.clientX, e.clientY);
        window.onmousemove = (e) => handleMove(e.clientX, e.clientY);
        window.onmouseup = () => isDragging = false;
        canvas.addEventListener('touchstart', (e) => {
            if(e.touches.length === 2) { initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); initialZoom = state.zoom; }
            else startDrag(e.touches[0].clientX, e.touches[0].clientY);
        }, {passive:false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e.touches[0].clientX, e.touches[0].clientY, e); }, {passive:false});
        canvas.addEventListener('touchend', () => { isDragging = false; initialPinchDist = 0; });

        function changeFrame(el, url) {
            document.querySelectorAll('.frame-thumb').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            state.frameUrl = url;
            loadFrame(url);
        }

        function resetPosition() {
            state.x = 0; state.y = 0;
            state.zoom = 2.5; // 리셋 시에도 중앙값으로 복구
            document.getElementById('moveX').value = 0;
            document.getElementById('moveY').value = 0;
            document.getElementById('zoom').value = state.zoom;
        }

        document.querySelectorAll('input[type="range"]').forEach(i => i.addEventListener('input', () => {
            state.zoom = parseFloat(document.getElementById('zoom').value);
            state.x = parseInt(document.getElementById('moveX').value);
            state.y = parseInt(document.getElementById('moveY').value);
            draw();
        }));

        function draw() {
            canvas.width = 1080; canvas.height = 1440;
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (isUserImgLoaded) {
                const imgW = userImg.width * state.zoom;
                const imgH = userImg.height * state.zoom;
                ctx.drawImage(userImg, (canvas.width - imgW) / 2 + state.x, (canvas.height - imgH) / 2 + state.y, imgW, imgH);
            }
            ctx.drawImage(frameImg, 0, 0, canvas.width, canvas.height);
        }

        document.getElementById('save-btn').onclick = () => {
            if (!isUserImgLoaded) return;
            const format = document.querySelector('input[name="format"]:checked').value;
            const link = document.createElement('a');
            link.download = `UMASNAP_PRO_${Date.now()}.${format}`;
            link.href = canvas.toDataURL(`image/${format}`, state.quality);
            link.click();
        };
    </script>
</body>
</html>
